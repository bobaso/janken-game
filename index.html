<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>じゃんけんゲーム</title>

<style>

body{
    margin:0;
    font-family:sans-serif;
    text-align:center;

    background-image:url("background.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    flex-direction:column;
    min-height:100vh;
}

h1{
    font-size:24px;
    margin:10px 0;
}

.character-area{

    flex:1;

    display:flex;
    justify-content:center;
    align-items:center;
}

.character{

    width:70%;
    max-width:350px;
}

.buttons{

    display:flex;
    justify-content:center;
    gap:10px;

    padding:20px;
}

.hand-btn{

    width:28%;
    max-width:120px;

    border:none;
    background:none;
    cursor:pointer;
}

.hand-btn img{

    width:100%;
}

#result{

    font-size:24px;
    font-weight:bold;
    padding-bottom:20px;
}

</style>
</head>

<body>

<h1>うーちゃんとじゃんけんで勝負</h1>

<div class="character-area">

<div>

    <img
        id="enemyHand"
        src="enemy_gu.png"
        style="width:120px; margin-bottom:10px;">

    <br>

<img
    id="character"
    src="character.png"
    class="character"
    alt="キャラクター">

</div>

</div>


<div id="result"></div>

<div class="buttons">

    <button class="hand-btn"
        onclick="play('グー')">
        <img src="gu.png">
    </button>

    <button class="hand-btn"
        onclick="play('チョキ')">
        <img src="choki.png">
    </button>

    <button class="hand-btn"
        onclick="play('パー')">
        <img src="pa.png">
    </button>

</div>

<script>

let win = 0;
let lose = 0;
let draw = 0;

function play(player){

    if(win >= 2 || lose >= 2){
        return;
    }

    const hands = [
        "グー",
        "チョキ",
        "パー"
    ];

const computer =
hands[Math.floor(Math.random()*3)];

let handImage = "";

if(computer === "グー"){
handImage = "enemy_gu.png";
}

else if(computer === "チョキ"){
handImage = "enemy_choki.png";
}

else if(computer === "パー"){
handImage = "enemy_pa.png";
}

document.getElementById("enemyHand").src = handImage;


    let result="";

if(player===computer){

    result="あいこ";
    draw++;

    document.getElementById("character").src =
        "character.png";
}

else if(

    (player==="グー" && computer==="チョキ") ||
    (player==="チョキ" && computer==="パー") ||
    (player==="パー" && computer==="グー")

){

    result="あなたの勝ち！";
    win++;

    document.getElementById("character").src =
        "character_lose.png";
}

else{

    result="あなたの負け...";
    lose++;

    document.getElementById("character").src =
        "character_win.png";
}

    let finalResult = "";

    if(win >= 2){

        finalResult = `
        <br><br>
        🎉 あなたの勝利です！ 🎉
        <br>
        3秒後にリセットします
        `;

        setTimeout(resetGame,3000);

    }

    if(lose >= 2){

        finalResult = `
        <br><br>
        😢 うーちゃんの勝利！
        <br>
        3秒後にリセットします
        `;

        setTimeout(resetGame,3000);

    }

    document.getElementById("result")
    .innerHTML=`

    うーちゃん：${computer}<br>
    ${result}

    <hr>

    勝ち：${win}<br>
    負け：${lose}<br>
    あいこ：${draw}

    ${finalResult}

    `;
}

function resetGame(){

    win = 0;
    lose = 0;
    draw = 0;

    document.getElementById("character").src =
        "character.png";

    document.getElementById("result")
    .innerHTML = `
    新しい勝負を開始！
    `;
}

</script>

</body>
</html>
