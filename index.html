<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>じゃんけんゲーム</title>

<style>
body{
    text-align:center;
    font-family:sans-serif;
    margin-top:50px;
}

button{
    font-size:20px;
    padding:10px 20px;
    margin:10px;
    cursor:pointer;
}

#result{
    margin-top:30px;
    font-size:24px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>じゃんけんゲーム</h1>

<button onclick="play('グー')">✊ グー</button>
<button onclick="play('チョキ')">✌️ チョキ</button>
<button onclick="play('パー')">✋ パー</button>

<div id="result"></div>

<script>

function play(player){

    const hands = ["グー","チョキ","パー"];

    const computer =
        hands[Math.floor(Math.random()*3)];

    let result="";

    if(player===computer){
        result="あいこ";
    }
    else if(
        (player==="グー" && computer==="チョキ") ||
        (player==="チョキ" && computer==="パー") ||
        (player==="パー" && computer==="グー")
    ){
        result="あなたの勝ち！";
    }
    else{
        result="コンピューターの勝ち！";
    }

    document.getElementById("result").innerHTML=
        `
        あなた：${player}<br>
        コンピューター：${computer}<br><br>
        ${result}
        `;
}

</script>

</body>
</html>
