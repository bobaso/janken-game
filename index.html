<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>うーちゃんとじゃんけんで勝負</title>

<style>

body{
    margin:0;
    font-family:sans-serif;
    text-align:center;
    background:#f5f5f5;

    display:flex;
    flex-direction:column;

    min-height:100vh;
}

h1{
    margin-top:20px;
}

.character-area{

    flex:1;

    display:flex;
    justify-content:center;
    align-items:center;
}

.character{

    width:70%;
    max-width:350px;
}

.buttons{

    display:flex;
    justify-content:center;
    gap:10px;

    padding:20px;
}

.hand-btn{

    width:28%;
    max-width:120px;

    border:none;
    background:none;
    cursor:pointer;
}

.hand-btn img{

    width:100%;
}

#result{

    font-size:24px;
    font-weight:bold;
    padding-bottom:20px;
}

</style>
</head>

<body>

<h1>じゃんけんゲーム</h1>

<div class="character-area">

    <img
        src="character.png"
        class="character"
        alt="キャラクター">

</div>

<div id="result"></div>

<div class="buttons">

    <button class="hand-btn"
        onclick="play('グー')">
        <img src="gu.png">
    </button>

    <button class="hand-btn"
        onclick="play('チョキ')">
        <img src="choki.png">
    </button>

    <button class="hand-btn"
        onclick="play('パー')">
        <img src="pa.png">
    </button>

</div>

<script>

function play(player){

    const hands = [
        "グー",
        "チョキ",
        "パー"
    ];

    const computer =
    hands[Math.floor(Math.random()*3)];

    let result="";

    if(player===computer){

        result="あいこ";
    }

    else if(

        (player==="グー" && computer==="チョキ") ||

        (player==="チョキ" && computer==="パー") ||

        (player==="パー" && computer==="グー")

    ){

        result="あなたの勝ち！";
    }

    else{

        result="あなたの負け...";
    }

    document.getElementById("result")
    .innerHTML=`

    相手：${computer}<br>
    ${result}

    `;
}

</script>

</body>
</html>
